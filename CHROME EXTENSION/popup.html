<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Freeze Detector</title>
  <style>
    body {
      font-family: Arial;
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    h3 {
      text-align: center;
      margin-bottom: 15px;
    }

    #status {
      font-weight: bold;
      text-align: center;
      margin-top: 10px;
    }

    button {
      display: block;
      width: 200px;
      margin: 10px auto;
      padding: 10px;
      font-size: 1em;
      cursor: pointer;
    }

    canvas, video {
      display: none;
    }
  </style>
</head>
<body>
  <h3>Freeze Detector</h3>

  <button id="startBtn">Start Monitoring</button>
  <button id="stopBtn">Stop Monitoring</button>
  <button id="testPiBtn">Test Notify Pi</button>

  <p id="status">Inactive</p>

  <canvas id="canvas"></canvas>
  <video id="video"></video>

  <script src="popup.js"></script>
</body>
</html>
